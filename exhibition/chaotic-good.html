<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaotic Good</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="chaotic-good.css">
</head>

<body>

<!-- SCORE -->
<div id="score">
  beers: <span id="beer-count">0</span><br>
  lines: <span id="line-count">0</span>
</div>

<!-- =====================
     WORK 01 — DIRECT
===================== -->

<div class="group active" id="w1-direct">
  <p>You arrive.</p>

  <div class="image-stack">
    <img class="ascii" src="images/w1-ascii.png" alt="">
    <img class="real"  src="images/w1.jpg" alt="">
  </div>

  <nav class="choices">
    <a onclick="drinkBeer()">Drink a beer</a>
    <a onclick="doLine()">Do a line</a>
    <a onclick="goTo('w1-close')">Stand closer</a>
    <a onclick="goTo('w2-direct')">Move on</a>
  </nav>
</div>

<!-- =====================
     WORK 01 — CLOSE
===================== -->

<div class="group" id="w1-close">
  <p>Up close, it refuses to stay whole.</p>

  <div class="image-stack">
    <img class="ascii" src="images/w1-ascii.png" alt="">
    <img class="real"  src="images/w1.jpg" alt="">
  </div>

  <nav class="choices">
    <a onclick="drinkBeer()">Another beer</a>
    <a onclick="doLine()">Escalate the evening</a>
    <a onclick="goTo('w1-direct')">Step back</a>
  </nav>
</div>

<!-- =====================
     WORK 02
===================== -->

<div class="group" id="w2-direct">
  <p>This work seems to demand context.</p>

  <div class="image-stack">
    <img class="ascii" src="images/w2-ascii.png" alt="">
    <img class="real"  src="images/w2.jpg" alt="">
  </div>

  <nav class="choices">
    <a onclick="drinkBeer()">Drink a beer</a>
    <a onclick="doLine()">Escalate the evening</a>
    <a onclick="goTo('w1-direct')">Pretend you just arrived</a>
  </nav>
</div>

<script src="chaotic-good.js"></script>
</body>
</html>
